              </div>
              
              <!-- Break -->
              <div class="col-12">
                <textarea name="demo-message" id="demo-message" placeholder="Entrez votre message" rows="6" required></textarea>
              </div>
              <!-- Break -->
              <div class="col-12">
                <ul class="actions">
                  <li><input type="submit" value="Envoyer" class="primary" /></li>
